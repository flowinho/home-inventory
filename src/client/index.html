<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Lokale Bestandsverwaltung für Räume, Aufbewahrungsorte und Gegenstände."
    />
    <meta name="theme-color" content="#146c63" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Hausbestand" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Hausbestand</title>
    <script>
      (function () {
        const savedTheme = localStorage.getItem("theme-mode");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const resolved = savedTheme === "light" || savedTheme === "dark"
          ? savedTheme
          : prefersDark
            ? "dark"
            : "light";
        document.documentElement.dataset.theme = resolved;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
